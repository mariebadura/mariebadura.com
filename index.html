<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marie Badura</title>
  <meta name="description" content="Product person, London. New site on the way." />
  <style>
    :root {
      --bg: #faf8f5;
      --ink: #1f1b16;
      --muted: #6f675e;
      --accent: #f4845f;
      --line: #e6e0d8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16130f;
        --ink: #f0ece6;
        --muted: #9b9389;
        --line: #2c2721;
      }
    }
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      line-height: 1.6;
      padding: 2rem;
    }
    main { max-width: 34rem; }
    h1 { font-size: 1.75rem; letter-spacing: -0.02em; }
    .accent-bar {
      width: 3rem; height: 4px; border-radius: 2px;
      background: linear-gradient(90deg, #f4845f, #e56399, #9b5de5);
      margin: 1.25rem 0 1.5rem;
    }
    p { color: var(--muted); }
    p + p { margin-top: 0.75rem; }
    a { color: var(--accent); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
    nav {
      margin-top: 2.5rem; padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Marie Badura // themodernfrau</h1>
    <div class="accent-bar" aria-hidden="true"></div>
    <p>Product person, London. A proper site is coming. (Eventually.)</p>
    <p>
      For now I&rsquo;m in the lab, building something new for one-person companies.
      <a href="https://thelab.mariebadura.com">Follow the build&nbsp;&rarr;</a>
    </p>
    <nav aria-label="Elsewhere">
      <a href="https://www.linkedin.com/in/mariebadura">LinkedIn</a>
      <a href="https://www.instagram.com/themodernfrau">Instagram</a>
    </nav>
  </main>
</body>
</html>
